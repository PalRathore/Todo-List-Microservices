version: "3.8"

services:

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: assignment_db
    ports:
      - "3307:3306"

  eureka:
    build: ./service-registry
    container_name: eureka_server
    ports:
      - "8761:8761"

  assignment-service:
    build: ./assignment-service
    container_name: assignment_service
    ports:
      - "8082:8082"
    depends_on:
      - eureka
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/assignment_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka

  api-gateway:
    build: ./api-gateway
    container_name: api_gateway
    ports:
      - "8081:8081"
    depends_on:
      - assignment-service
      - eureka
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka